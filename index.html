<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/logo.png" />
    <link rel="apple-touch-icon" href="/logo.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0" />
    <meta name="description" content="AI-powered SaaS idea generator with revenue breakdowns, execution plans, market analysis, and team planning. Discover profitable business ideas instantly." />
    <meta name="keywords" content="SaaS ideas, AI idea generator, startup ideas, business idea generator, revenue breakdown, execution plan, market analysis, side project ideas, micro-SaaS, indie hacker, solopreneur" />
    <meta name="author" content="OpenProjectIdea" />
    <meta name="theme-color" content="#6366f1" />
    <meta name="application-name" content="OpenProjectIdea" />
    <meta name="robots" content="index, follow, max-image-preview:large, max-snippet:-1, max-video-preview:-1" />
    <link rel="canonical" href="https://openprojectidea.com" />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://openprojectidea.com" />
    <meta property="og:title" content="OpenProjectIdea — AI-Powered SaaS Idea Generator" />
    <meta property="og:description" content="AI-powered SaaS idea generator with revenue breakdowns, execution plans, market analysis, and team planning. Discover profitable business ideas instantly." />
    <meta property="og:image" content="https://openprojectidea.com/og-image.svg" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:type" content="image/svg+xml" />
    <meta property="og:site_name" content="OpenProjectIdea" />
    <meta property="og:locale" content="en_US" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="OpenProjectIdea — AI-Powered SaaS Idea Generator" />
    <meta name="twitter:description" content="AI-powered SaaS idea generator with revenue breakdowns, execution plans, market analysis, and team planning." />
    <meta name="twitter:image" content="https://openprojectidea.com/og-image.png" />

    <title>OpenProjectIdea — AI-Powered SaaS Idea Generator</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />

    <!-- Structured Data: Organization + WebSite + SoftwareApplication -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@graph": [
        {
          "@type": "Organization",
          "name": "OpenProjectIdea",
          "url": "https://openprojectidea.com",
          "logo": "https://openprojectidea.com/logo.png",
          "description": "AI-powered platform for generating profitable SaaS and business ideas with revenue breakdowns, execution plans, and market analysis.",
          "contactPoint": {
            "@type": "ContactPoint",
            "email": "hello@tsatsupeter.com",
            "contactType": "customer support"
          }
        },
        {
          "@type": "WebSite",
          "name": "OpenProjectIdea",
          "url": "https://openprojectidea.com",
          "description": "AI-powered SaaS idea generator with revenue breakdowns, execution plans, market analysis, and team planning.",
          "potentialAction": {
            "@type": "SearchAction",
            "target": {
              "@type": "EntryPoint",
              "urlTemplate": "https://openprojectidea.com/explore?q={search_term_string}"
            },
            "query-input": "required name=search_term_string"
          }
        },
        {
          "@type": "SoftwareApplication",
          "name": "OpenProjectIdea",
          "applicationCategory": "BusinessApplication",
          "operatingSystem": "Web",
          "url": "https://openprojectidea.com",
          "description": "Generate AI-powered SaaS business ideas with revenue projections, execution plans, and market analysis.",
          "offers": [
            { "@type": "Offer", "price": "0", "priceCurrency": "USD", "name": "Free Plan" },
            { "@type": "Offer", "price": "9.99", "priceCurrency": "USD", "name": "Pro Monthly" },
            { "@type": "Offer", "price": "19.99", "priceCurrency": "USD", "name": "Team Monthly" }
          ]
        }
      ]
    }
    </script>
  </head>
  <body class="antialiased">
    <script>
      document.documentElement.classList.add(window.matchMedia('(prefers-color-scheme:dark)').matches?'dark':'light')
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
