  <text x="780" y="284" font-family="Arial, sans-serif" font-size="14" fill="#8b8bf8" text-anchor="middle">AI-Powered</text>
  <rect x="880" y="260" width="160" height="36" rx="18" fill="#6366f1" opacity="0.15"/>
  <text x="960" y="284" font-family="Arial, sans-serif" font-size="14" fill="#8b8bf8" text-anchor="middle">Market Analysis</text>
  <rect x="700" y="310" width="160" height="36" rx="18" fill="#6366f1" opacity="0.15"/>
  <text x="780" y="334" font-family="Arial, sans-serif" font-size="14" fill="#8b8bf8" text-anchor="middle">Revenue Data</text>
  <rect x="880" y="310" width="160" height="36" rx="18" fill="#6366f1" opacity="0.15"/>
  <text x="960" y="334" font-family="Arial, sans-serif" font-size="14" fill="#8b8bf8" text-anchor="middle">Execution Plans</text>
  <rect x="700" y="360" width="160" height="36" rx="18" fill="#6366f1" opacity="0.15"/>
